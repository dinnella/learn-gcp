name: practice-app — build, deploy, seed

on:
  push:
    branches: [main]
    paths:
      - 'practice-app/**'
      - '.github/workflows/practice-app.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

# Serialize deploys: prevent overlapping runs from racing on the tofu state lock
# or pushing the same image tag twice.
concurrency:
  group: practice-app-deploy
  cancel-in-progress: false

env:
  REGION: us-central1
  AR_REPO: apps
  IMAGE: practice-app
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "0"

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v3

      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: '1.8.5'
          tofu_wrapper: false

      # 1) Bootstrap infra (Firestore + AR + initial Cloud Run with hello image).
      #    Idempotent — safe to run every time.
      - name: tofu init (infra)
        working-directory: practice-app/infra
        run: |
          tofu init \
            -backend-config="bucket=${{ vars.GCP_TFSTATE_BUCKET }}" \
            -backend-config="prefix=practice-app"

      - name: tofu validate (infra)
        working-directory: practice-app/infra
        run: tofu validate

      - name: tofu apply (bootstrap if needed)
        working-directory: practice-app/infra
        env:
          TF_VAR_edge_shared_secret: ${{ secrets.EDGE_SHARED_SECRET }}
        run: |
          tofu apply -auto-approve \
            -var "project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var "domain=${{ vars.PUBLIC_DOMAIN }}" \
            -var "enable_lb=${{ vars.ENABLE_LB || 'false' }}" \
            -var "restrict_ingress_to_lb=${{ vars.RESTRICT_INGRESS_TO_LB || 'false' }}"

      # 2) Build & push the container image to Artifact Registry.
      - name: Configure docker for AR
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        working-directory: practice-app/backend
        run: |
          IMAGE_URI="${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:${{ github.sha }}"
          docker build --target runtime -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      # 3) Re-apply infra with the new image tag — Cloud Run rolls forward atomically.
      - name: tofu apply (deploy new revision)
        working-directory: practice-app/infra
        env:
          TF_VAR_edge_shared_secret: ${{ secrets.EDGE_SHARED_SECRET }}
        run: |
          tofu apply -auto-approve \
            -var "project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var "image_tag=${{ github.sha }}" \
            -var "domain=${{ vars.PUBLIC_DOMAIN }}" \
            -var "enable_lb=${{ vars.ENABLE_LB || 'false' }}" \
            -var "restrict_ingress_to_lb=${{ vars.RESTRICT_INGRESS_TO_LB || 'false' }}"

      # 4) Seed Firestore (idempotent — overwrites by document ID).
      - name: Install seeder deps
        run: pip install --quiet google-cloud-firestore==2.19.0

      - name: Seed questions
        env:
          GOOGLE_CLOUD_PROJECT: ${{ vars.GCP_PROJECT_ID }}
        working-directory: practice-app
        run: python -m backend.app.seed_emulator || python backend/app/seed_emulator.py

      - name: Print service URL
        id: service_url
        working-directory: practice-app/infra
        run: |
          URL=$(tofu output -raw service_url)
          HOST=$(tofu output -raw service_hostname)
          echo "::notice title=Practice App URL::$URL"
          echo "service_hostname=$HOST" >> "$GITHUB_OUTPUT"

  cloudflare-apply:
    needs: build-deploy
    if: ${{ vars.ENABLE_CLOUDFLARE == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      # WIF login is only used to access the GCS tfstate bucket — we re-use the
      # same backend so cloudflare state lives next to gcp state under a
      # different prefix.
      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: '1.8.5'
          tofu_wrapper: false

      # Re-read the Cloud Run hostname from the GCP state so we don't depend on
      # passing it between jobs (more robust if this job is re-run alone).
      - name: tofu init (gcp — read service_hostname)
        working-directory: practice-app/infra
        run: |
          tofu init -input=false \
            -backend-config="bucket=${{ vars.GCP_TFSTATE_BUCKET }}" \
            -backend-config="prefix=practice-app"

      - name: Read Cloud Run hostname
        id: gcp_out
        working-directory: practice-app/infra
        run: echo "service_hostname=$(tofu output -raw service_hostname)" >> "$GITHUB_OUTPUT"

      - name: tofu init (cloudflare)
        working-directory: practice-app/infra-cloudflare
        run: |
          tofu init -input=false \
            -backend-config="bucket=${{ vars.GCP_TFSTATE_BUCKET }}" \
            -backend-config="prefix=practice-app-cloudflare"

      # One-time v4→v5 state migration. Uses tofu state pull/push so GCP WIF
      # credentials work (gsutil doesn't understand WIF credential files).
      # Safe to leave in: the jq selects are no-ops once old types are gone.
      - name: Migrate cloudflare state (v4→v5)
        working-directory: practice-app/infra-cloudflare
        run: |
          echo "Pulling current state..."
          tofu state pull > /tmp/cf.tfstate

          echo "Resource types in state:"
          jq '[.resources[].type] | unique' /tmp/cf.tfstate

          if jq -e '.resources[] | select(
                .type == "cloudflare_record" or
                .type == "cloudflare_zone_settings_override"
              )' /tmp/cf.tfstate >/dev/null 2>&1; then
            echo "Found v4 resource types — migrating..."
            # cloudflare_ruleset is intentionally kept: the type name is the same
            # in v4 and v5, so v5 can read it and will update in-place (no POST).
            jq '
              .serial += 1 |
              .resources |= map(
                if .type == "cloudflare_record" then .type = "cloudflare_dns_record" else . end
              ) |
              .resources |= map(select(.type != "cloudflare_zone_settings_override"))
            ' /tmp/cf.tfstate > /tmp/cf.migrated.tfstate
            echo "After migration:"
            jq '[.resources[].type] | unique' /tmp/cf.migrated.tfstate
            tofu state push /tmp/cf.migrated.tfstate
            echo "State migrated successfully."
          else
            echo "No v4 resources found — skipping."
          fi

      # If a ruleset already exists in the Cloudflare API but is absent from
      # state (e.g. edge_auth survived a state wipe), apply would POST a second
      # one and hit error 20217 (max zone rulesets per phase). Import it first.
      # Safe on every run: "already in state" exits 1, caught by || true.
      - name: Import orphaned Cloudflare rulesets
        working-directory: practice-app/infra-cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_edge_shared_secret: ${{ secrets.EDGE_SHARED_SECRET }}
          TF_VAR_hostname: ${{ vars.PUBLIC_DOMAIN }}
          TF_VAR_origin_hostname: ${{ steps.gcp_out.outputs.service_hostname }}
        run: |
          ZONE_NAME=$(echo "${{ vars.PUBLIC_DOMAIN }}" | awk -F. '{print $(NF-1)"."$NF}')
          ZONE_ID=$(curl -sS -f -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=$ZONE_NAME" | \
            jq -r '.result[0].id')
          RULESETS=$(curl -sS -f -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/rulesets")

          declare -A PHASE_TO_RESOURCE=(
            [http_request_late_transform]=cloudflare_ruleset.edge_auth
            [http_ratelimit]=cloudflare_ruleset.rate_limit
          )
          for PHASE in "${!PHASE_TO_RESOURCE[@]}"; do
            RESOURCE="${PHASE_TO_RESOURCE[$PHASE]}"
            RULESET_ID=$(echo "$RULESETS" | jq -r ".result[]? | select(.phase == \"$PHASE\") | .id // empty")
            if [ -n "$RULESET_ID" ]; then
              echo "Importing $RESOURCE ($RULESET_ID) — already in state is OK"
              tofu import "$RESOURCE" "$ZONE_ID/$RULESET_ID" || true
            else
              echo "No existing ruleset for $PHASE — apply will create it."
            fi
          done

      - name: tofu validate (cloudflare)
        working-directory: practice-app/infra-cloudflare
        run: tofu validate

      - name: tofu apply (cloudflare)
        working-directory: practice-app/infra-cloudflare
        env:
          # Pass all sensitive values as TF_VAR_* env vars (not -var on argv) so
          # they don't appear in the runner's process listing.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_edge_shared_secret: ${{ secrets.EDGE_SHARED_SECRET }}
          TF_VAR_hostname: ${{ vars.PUBLIC_DOMAIN }}
          TF_VAR_origin_hostname: ${{ steps.gcp_out.outputs.service_hostname }}
        run: |

          tofu apply -auto-approve

      - name: Print public URL
        working-directory: practice-app/infra-cloudflare
        run: echo "::notice title=Public URL::$(tofu output -raw public_url)"
