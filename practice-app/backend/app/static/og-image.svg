<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0e1a"/>
      <stop offset="100%" stop-color="#161a26"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4285f4"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
    <radialGradient id="glow1" cx="80%" cy="10%" r="50%">
      <stop offset="0%" stop-color="#7c4dff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="90%" r="50%">
      <stop offset="0%" stop-color="#4285f4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Border frame -->
  <rect x="20" y="20" width="1160" height="590" rx="18" fill="none" stroke="#2a2f3f" stroke-width="2"/>

  <!-- Lightning bolt icon -->
  <polygon points="640,100 590,230 622,230 612,330 670,200 638,200" fill="url(#accent)"/>

  <!-- Brand name -->
  <text x="600" y="390" font-family="system-ui,-apple-system,Helvetica,Arial,sans-serif"
        font-size="74" font-weight="800" text-anchor="middle" fill="url(#accent)">Next3k LevelUp</text>

  <!-- Tagline -->
  <text x="600" y="460" font-family="system-ui,-apple-system,Helvetica,Arial,sans-serif"
        font-size="34" font-weight="400" text-anchor="middle" fill="#8a93a4">GCP Cert Practice · PCA &amp; DevOps Engineer</text>

  <!-- Sub-tagline -->
  <text x="600" y="520" font-family="system-ui,-apple-system,Helvetica,Arial,sans-serif"
        font-size="26" font-weight="400" text-anchor="middle" fill="#5a6270">10 questions · live grading · leaderboard</text>

  <!-- Tag pill outline -->
  <rect x="382" y="548" width="436" height="42" rx="21" fill="none" stroke="#2a2f3f" stroke-width="1.5"/>
  <text x="600" y="575" font-family="system-ui,-apple-system,Helvetica,Arial,sans-serif"
        font-size="20" font-weight="600" text-anchor="middle" fill="#5a6270" letter-spacing="2">levelup.next3k.com</text>
</svg>
